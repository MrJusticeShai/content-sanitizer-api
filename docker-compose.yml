version: "3.9"

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "${DB_PASS}"
    networks:
      - app-network

  sanitizer-api:
    build: .
    container_name: sanitizer-api
    ports:
      - "8080:8080"
    environment:
      DB_HOST: sqlserver
      DB_PORT: 1433
      DB_NAME: sensitivewords
      DB_USER: sa
      DB_PASS: "${DB_PASS}"
    depends_on:
      - sqlserver
    networks:
      - app-network

networks:
  app-network:
    driver: bridge