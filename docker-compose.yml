services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "${DB_PASS}"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P ${DB_PASS} -Q 'SELECT 1' -No"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  sanitizer-api:
    build: .
    container_name: sanitizer-api
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DB_HOST: sqlserver
      DB_PORT: 1433
      DB_NAME: sensitivewords
      DB_USER: sa
      DB_PASS: "${DB_PASS}"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - app-network
    restart: on-failure

networks:
  app-network:
    driver: bridge