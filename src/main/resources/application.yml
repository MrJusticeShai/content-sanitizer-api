spring:
  datasource:
    url: jdbc:sqlserver://${DB_HOST:localhost}:${DB_PORT:1433};databaseName=${DB_NAME:sensitivewords};encrypt=false
    username: ${DB_USER:sa}
    password: ${DB_PASS:Password123!}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    database-platform: org.hibernate.dialect.SQLServerDialect
    hibernate:
      ddl-auto: update
    show-sql: true

sanitizer:
  bulk:
    max-size: ${BULK_CREATE_MAX_SIZE:100}